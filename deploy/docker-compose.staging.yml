networks:
  siestai:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - siestai
    environment:
      POSTGRES_DB: siestai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    networks:
      - siestai
    expose:
      - "4200"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4200
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ARENA_INVITE_SECRET: ${ARENA_INVITE_SECRET}
      FRONTEND_URL: https://staging.siestai.com
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/siestai
      BETTER_AUTH_URL: https://api-staging.siestai.com
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      COOKIE_DOMAIN: .siestai.com
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  web:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://api-staging.siestai.com
        NEXT_PUBLIC_LIVEKIT_URL: wss://siestai-qk2c7bgk.livekit.cloud
    restart: unless-stopped
    networks:
      - siestai
    expose:
      - "3000"
    environment:
      API_URL: http://api:4200

  agent:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.agent
    init: true
    restart: unless-stopped
    networks:
      - siestai
    depends_on:
      - api
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  pgdata:
