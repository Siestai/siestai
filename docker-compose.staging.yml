version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    env_file:
      - .env.staging
    environment:
      - PORT=4200
    restart: unless-stopped

  ui-web:
    build:
      context: ./ui-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.staging.siestai.com
        NEXT_PUBLIC_LIVEKIT_URL: wss://siestai-qk2c7bgk.livekit.cloud
    ports:
      - "3000:3000"
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    env_file:
      - .env.staging
    restart: unless-stopped
