services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: siestai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mastra:
    build:
      context: ./mastra
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4111:4111"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/siestai
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - mastra
    environment:
      PORT: 4200
      MASTRA_URL: http://mastra:4111
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ARENA_INVITE_SECRET: ${ARENA_INVITE_SECRET}
      FRONTEND_URL: https://staging.siestai.com
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/siestai

  ui-web:
    build:
      context: ./ui-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-staging.siestai.com
        NEXT_PUBLIC_LIVEKIT_URL: wss://siestai-qk2c7bgk.livekit.cloud
    restart: unless-stopped
    ports:
      - "3000:3000"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

volumes:
  pgdata:
